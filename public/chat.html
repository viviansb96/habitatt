<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Habitatt - Chat da Negociação</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <h1 onclick="window.location.href='index.html'">Habitatt</h1>
        <nav><a href="imoveis.html?view=all">Voltar aos Imóveis</a></nav>
    </header>

    <main class="chat-container" style="display: flex; gap: 30px; max-width: 1000px;">
        
        <div class="card" style="width: 300px; height: fit-content;">
            <h3 style="color: var(--text-muted); font-size: 14px; text-transform: uppercase;">Negociando:</h3>
            <h2 id="propNameDisplay" style="color: var(--accent-neon); margin: 10px 0 20px 0;">Carregando...</h2>
            <p style="color: var(--text-muted); font-size: 14px;"><i class="fa-solid fa-shield-halved"></i> Conversa protegida de ponta a ponta.</p>
        </div>

        <div class="chat-window" style="flex: 1;">
            <div style="padding: 20px; background: #111; border-bottom: 1px solid var(--border-color)">
                <h3 style="color: white"><i class="fa-solid fa-user-tie"></i> Proprietário do Imóvel</h3>
            </div>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-wrapper">
                <input type="text" id="messageInput" placeholder="Escreva sua mensagem...">
                <button class="btn-primary" style="width: auto;" onclick="sendMessage()">Enviar</button>
            </div>
        </div>
    </main>

    <script>
        const userId = localStorage.getItem('habitatt_userId');
        const urlParams = new URLSearchParams(window.location.search);
        const propertyId = urlParams.get('propertyId');
        const propertyTitle = urlParams.get('title') || 'Imóvel Selecionado';
        const locadorId = 99;

        // Preenche o nome do imóvel na lateral
        document.getElementById('propNameDisplay').innerText = propertyTitle;

        async function loadChatHistory() {
            try {
                const res = await fetch(`/api/chat/history?userA=${userId}&userB=${locadorId}`);
                const history = await res.json();
                const box = document.getElementById('chatMessages');
                box.innerHTML = '';

                if(history.length === 0 || history.error) {
                    box.innerHTML = `<div class="message received">Olá! Vi que você se interessou pelo imóvel <strong>${propertyTitle}</strong>. Como posso ajudar?</div>`;
                    return;
                }

                history.forEach(msg => {
                    // Verifica se o ID bate com o usuário (aceita tanto sender_id quanto senderId dependendo da sua API)
                    const sender = msg.sender_id || msg.senderId; 
                    const isMe = (sender == userId);
                    box.innerHTML += `<div class="message ${isMe ? 'sent' : 'received'}">${msg.content}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            } catch (err) { console.error(err); }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if(!content) return;

            // Renderiza na tela imediatamente para experiência do usuário
            const box = document.getElementById('chatMessages');
            box.innerHTML += `<div class="message sent">${content}</div>`;
            box.scrollTop = box.scrollHeight;
            input.value = '';

            try {
                // Tenta salvar no banco
                await fetch('/api/chat/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ senderId: Number(userId), receiverId: locadorId, content: content })
                });
            } catch (err) { console.error("Erro ao salvar mensagem no banco", err); }
        }

        window.onload = loadChatHistory;
    </script>
</body>
</html>
