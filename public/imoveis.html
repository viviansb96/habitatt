<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Habitatt - Escolha seu Lugar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <h1 onclick="window.location.href='index.html'">Habitatt</h1>
        <nav>
            <a href="imoveis.html?view=match" id="navMatch">Meus Matches</a>
            <a href="imoveis.html?view=all" id="navAll">Imóveis Disponíveis</a>
            <a href="perfil.html" style="color: var(--accent-neon);"><i class="fa-solid fa-user"></i> Meu Perfil</a>
        </nav>
    </header>

    <main>
        <h2 id="pageTitle" style="font-size: 32px;">Carregando imóveis...</h2>
        <div id="propertiesGrid" class="grid"></div>
    </main>

<script>
    const userId = localStorage.getItem('habitatt_userId');
    const userName = localStorage.getItem('habitatt_userName');
    const urlParams = new URLSearchParams(window.location.search);
    const viewMode = urlParams.get('view') || 'all';

    // Se tentar acessar os matches sem ter passado pelo quiz, redireciona
    if (viewMode === 'match' && (!userId || userId === 'undefined')) {
        alert('Nenhum perfil encontrado. Responda ao quiz para gerar seus matches!');
        window.location.href = 'index.html';
    }

    async function loadPage() {
        let endpoint = '/api/properties';
        
        if (viewMode === 'match') {
            endpoint = `/api/properties/match/${userId}`;
            document.getElementById('navMatch').classList.add('active');
            document.getElementById('pageTitle').innerHTML = `Matches calculados para: <span style="color: var(--accent-neon);">${userName}</span>`;
        } else {
            document.getElementById('navAll').classList.add('active');
            document.getElementById('pageTitle').innerText = 'Imóveis Disponíveis:';
        }

        try {
            const res = await fetch(endpoint);
            if (!res.ok) throw new Error('Erro ao buscar imóveis');
            const properties = await res.json();
            renderCards(properties);
        } catch (err) {
            console.error(err);
            document.getElementById('pageTitle').innerText = 'Erro ao carregar os dados da nuvem.';
        }
    }

    function renderCards(properties) {
        const grid = document.getElementById('propertiesGrid');
        grid.innerHTML = '';

        if (!properties || properties.length === 0) {
            grid.innerHTML = '<p style="color: var(--text-muted); padding: 20px;">Nenhum imóvel encontrado para os critérios selecionados.</p>';
            return;
        }

        properties.forEach(prop => {
            const scoreTag = prop.score !== undefined ? `<div class="tag score">⭐ Score: ${prop.score}%</div>` : '';
            const urlSafeTitle = encodeURIComponent(prop.title);

            grid.innerHTML += `
                <div class="property-card">
                    <div style="height: 200px; width: 100%; overflow: hidden; background: #111;">
                        <img src="images/${prop.id}.jpg" onerror="this.src='https://via.placeholder.com/400x200/222/deff9a?text=Habitatt+Imóveis'" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <div class="property-content">
                        <div class="property-tags">
                            <div class="tag">${prop.vibe.toUpperCase()}</div>
                            ${scoreTag}
                        </div>
                        <h3>${prop.title}</h3>
                        <p style="color: var(--text-muted); margin-top: 8px;">
                            ${prop.bedrooms} Quarto(s) • ${prop.accepts_pet ? 'Aceita Pets' : 'Não Aceita Pets'}
                        </p>
                        <div class="price">R$ ${Number(prop.price).toFixed(2)}</div>
                        <div class="card-actions">
                            <button class="btn-chat" onclick="window.location.href='chat.html?propertyId=${prop.id}&title=${urlSafeTitle}'">
                                <i class="fa-regular fa-comment"></i> Falar com Locador
                            </button>
                            <button class="btn-fav" onclick="favoriteProperty(${prop.id}, this)">
                                <i class="fa-solid fa-heart"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    async function favoriteProperty(id, btn) {
        if (!userId || userId === 'undefined') return alert('Faça o quiz para poder favoritar imóveis.');
        try {
            await fetch('/api/favorites', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: Number(userId), propertyId: id })
            });
            btn.classList.toggle('active');
        } catch (err) { console.error(err); }
    }

    window.onload = loadPage;
</script>
</body>
</html>
