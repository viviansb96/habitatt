<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Habitatt - Descubra seu Lar</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 480px; }
        .tab-btn { flex: 1; padding: 12px; background: #222; border: 1px solid #333; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--accent-neon); color: black; border-color: var(--accent-neon); }
        .auth-form { display: none; width: 100%; max-width: 480px; }
        .auth-form.active { display: block; }
    </style>
</head>
<body>
    <header>
        <h1 onclick="window.location.href='index.html'">Habitatt</h1>
    </header>
    <main style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="font-size: 42px; margin-bottom: 12px;">Bem-vindo ao <span style="color: var(--accent-neon)">Habitatt</span></h2>
            <p style="color: var(--text-muted)">Escolha como deseja acessar a plataforma.</p>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn active" onclick="switchTab('quizSection', this)">Responder Quiz</button>
            <button class="tab-btn" onclick="switchTab('loginSection', this)">Já tenho Conta</button>
        </div>

        <div id="quizSection" class="auth-form active">
            <form id="quizForm" class="card">
                <div class="form-group">
                    <label>Escolha um Nome de Usuário</label>
                    <input type="text" id="userName" required placeholder="Ex: nome_sobrenome">
                </div>
                <div class="form-group">
                    <label>Crie uma Senha</label>
                    <input type="password" id="userPassword" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Orçamento Máximo Mensal</label>
                    <input type="number" id="budget" required placeholder="R$ 2000">
                </div>
                <div class="form-group">
                    <label>Qual o seu estilo de vida atual?</label>
                    <select id="vibe">
                        <option value="tranquilo">Tranquilo (Residencial)</option>
                        <option value="agitado">Agitado (Centros)</option>
                        <option value="estudante">Estudante (Próximo a Universidades)</option>
                    </select>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-top: 25px;">
                    <input type="checkbox" id="hasPet" style="width: auto; cursor: pointer;">
                    <label style="margin-bottom: 0; cursor: pointer;">Possuo animais de estimação</label>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 20px;">Cadastrar e Ver Matches</button>
            </form>
        </div>

        <div id="loginSection" class="auth-form">
            <form id="loginForm" class="card">
                <div class="form-group">
                    <label>Nome de Usuário</label>
                    <input type="text" id="loginName" required placeholder="Seu nome de usuário">
                </div>
                <div class="form-group">
                    <label>Sua Senha</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 20px;">Entrar na Conta</button>
            </form>
        </div>
    </main>

    <script>
        // Função para alternar visualmente entre as telas de Login e Quiz
        function switchTab(sectionId, btn) {
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            btn.classList.add('active');
        }

        // LÓGICA DE CADASTRO + QUIZ
        document.getElementById('quizForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const inputName = document.getElementById('userName').value.trim();
            const inputPassword = document.getElementById('userPassword').value;
            
            const payload = {
                name: inputName,
                password: inputPassword, // Enviando a senha criada
                profile: {
                    maxBudget: Number(document.getElementById('budget').value),
                    desiredVibe: document.getElementById('vibe').value,
                    hasPet: document.getElementById('hasPet').checked
                }
            };

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) throw new Error('Erro ao cadastrar');
                const user = await response.json();
                
                localStorage.setItem('habitatt_userId', user.id);
                localStorage.setItem('habitatt_userName', inputName);
                
                window.location.href = 'imoveis.html?view=match';
            } catch (err) {
                alert('Erro ao realizar o cadastro.');
            }
        });

        // LÓGICA DE LOGIN DIRETO
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('loginName').value.trim();
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    alert(data.error || 'Erro ao fazer login');
                    return;
                }

                // Salva a sessão no navegador igual ao fluxo do quiz
                localStorage.setItem('habitatt_userId', data.id);
                localStorage.setItem('habitatt_userName', data.name);

                // Como ele já tinha conta, leva direto para os imóveis disponíveis
                window.location.href = 'imoveis.html?view=match';
            } catch (err) {
                console.error(err);
                alert('Erro ao conectar com o servidor.');
            }
        });
    </script>
</body>
</html>
